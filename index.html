<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dice Roguelike v9.8</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden}
body{height:100%;overflow:hidden;display:flex;justify-content:center;background:#1a1a2e;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.phone{background:#f8f8f8;width:100%;max-width:430px;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden}
button{font-family:inherit;cursor:pointer;-webkit-appearance:none}

/* ── ENEMY BAR ── */
.ez{background:#fff;padding:7px 12px 5px;border-bottom:1px solid #eee;flex-shrink:0}
.er{display:flex;gap:8px;align-items:center}
.av{width:38px;height:38px;border-radius:10px;background:#f5eeff;border:2px solid #9b59b6;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;overflow:hidden}
.ei{flex:1;min-width:0}
.en{font-size:11px;font-weight:600;color:#111;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hrow{display:flex;align-items:center;gap:5px;margin-bottom:2px}
.hbar{flex:1;background:#f0f0f0;border-radius:3px;height:5px;overflow:hidden}
.hfil{height:100%;border-radius:3px;background:#e74c3c;transition:width .4s}
.htxt{font-size:9px;color:#999;min-width:42px;text-align:right;flex-shrink:0}
.ebot{display:flex;align-items:center;justify-content:space-between}
.ibadge{display:inline-flex;align-items:center;gap:3px;background:#fff0f0;border:1px solid #fcc;border-radius:5px;padding:1px 5px;font-size:9px;color:#c0392b}
.idot{width:4px;height:4px;border-radius:50%;background:#e74c3c;flex-shrink:0}
.rbtn{background:#f0f0f0;border:1px solid #ddd;color:#888;border-radius:5px;padding:2px 6px;font-size:8px}

/* ── COMBO HINT: below enemy bar, right-aligned ── */
.combo-hint{
  background:#fff;border-bottom:1px solid #eee;
  padding:3px 12px 4px;flex-shrink:0;
  display:flex;align-items:center;justify-content:flex-end;
  min-height:22px;gap:4px;flex-wrap:wrap;
}
.combo-chip{
  display:inline-flex;align-items:center;gap:3px;
  background:#f0f7ff;border:1px solid #aed6f1;
  border-radius:5px;padding:1px 5px;font-size:8px;color:#1a5276;
  white-space:nowrap;
}
.combo-chip img{width:10px;height:10px;object-fit:contain}
.combo-chip.special{background:#fff3e0;border-color:#f5cba7;color:#d35400}
.combo-chip.steak{background:#fff3e0;border-color:#f39c12;color:#e67e22}
.combo-empty{font-size:8px;color:#ccc;font-style:italic}

/* ── BANNERS ── */
.ban{display:none;text-align:center;padding:3px 10px;font-size:11px;font-weight:500;flex-shrink:0}
.ban.bust{background:#ffeaea;color:#c0392b;border-bottom:1px solid #e74c3c}
.ban.steak{background:#fff3e0;color:#d35400;border-bottom:1px solid #f39c12}
.ban.on{display:block}

/* ── ARENA ── */
.arena{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:5px 12px;overflow:hidden}
.dg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;width:100%;max-width:252px}
.dw{display:flex;flex-direction:column;align-items:center;gap:2px}
.die{
  width:100%;aspect-ratio:1;border-radius:12px;
  border:2px solid #ddd;background:#fff; /* always white */
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;overflow:hidden;
  transition:border-color .12s;
}
.die:active{transform:scale(.86)}
.die img{width:70%;height:70%;object-fit:contain;pointer-events:none;display:block} /* 70% = +20% vs 58% */
.die.sel{border-color:#f39c12;background:#fff}
.die.slot{border:2px dashed #e8e8e8;background:#fafafa;cursor:default}
.die.slot img{opacity:.12}
@keyframes spin{0%{transform:rotate(-25deg) scale(.72)}20%{transform:rotate(22deg) scale(1.14)}45%{transform:rotate(-14deg) scale(.92)}65%{transform:rotate(10deg) scale(1.04)}82%{transform:rotate(-5deg) scale(.98)}100%{transform:rotate(0) scale(1)}}
@keyframes hotpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes flash{0%,100%{background:#f5eeff}30%{background:#ffe8e8}70%{background:#f5eeff}}
@keyframes bigshake{0%,100%{transform:translateX(0) scale(1)}12%{transform:translateX(-9px) scale(1.1) rotate(-3deg)}28%{transform:translateX(8px) scale(1.08) rotate(2deg)}44%{transform:translateX(-6px)}58%{transform:translateX(5px)}72%{transform:translateX(-3px)}86%{transform:translateX(2px)}}
@keyframes hpshake{0%,100%{transform:translateX(0)}15%{transform:translateX(-4px)}30%{transform:translateX(4px)}45%{transform:translateX(-3px)}60%{transform:translateX(3px)}75%{transform:translateX(-1px)}}
@keyframes boxin{0%{transform:scale(.88);opacity:0}70%{transform:scale(1.02)}100%{transform:scale(1);opacity:1}}
.die.rolling{animation:spin 2.4s ease forwards}
.die.hotdie{border-color:#f39c12;background:#fff;animation:hotpulse .5s ease 4}
.av.flash{animation:flash .4s ease}
.av.bigshake{animation:bigshake .6s ease}
.hrow.shake{animation:hpshake .4s ease}
.dlbl{font-size:7px;color:#ccc;user-select:none;line-height:1}
.dlbl.s{color:#f39c12}.dlbl.inv{color:#e74c3c}

/* Groups */
.groups-area{display:flex;flex-direction:column;gap:3px;width:100%;max-width:320px}
.gbox{border-radius:7px;padding:3px 7px;display:flex;align-items:flex-start;gap:4px;animation:boxin .2s ease}
.gbox.steak{background:#fff3e0;border:1.5px solid #f39c12}
.gbox.pushrow{background:#f5f5f5;border:1px solid #e8e8e8}
.gbox.selbox{background:#fff;border:1.5px solid #2980b9}
.gbox-lbl{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;flex-shrink:0;padding-top:2px;min-width:40px;line-height:1.3}
.gbox.steak .gbox-lbl{color:#e67e22}
.gbox.pushrow .gbox-lbl{color:#bbb}
.gbox.selbox .gbox-lbl{color:#2980b9}
.gbox-content{display:flex;align-items:center;flex-wrap:wrap;gap:2px;flex:1}
.gchip{width:16px;height:16px;border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.gchip img{width:10px;height:10px;object-fit:contain}
.gbox.steak .gchip{background:#fff;border:1px solid #f5cba7}
.gbox.pushrow .gchip{background:#fff;border:1px solid #ddd}
.gbox.selbox .gchip{background:#eef6ff;border:1px solid #aed6f1}
.gcomma{font-size:8px;color:#ccc;align-self:center;margin:0 1px}
.gbox-score{font-size:8px;font-weight:600;flex-shrink:0;padding-top:2px;text-align:right;line-height:1.4;min-width:38px}
.gbox.steak .gbox-score{color:#e67e22}
.gbox.pushrow .gbox-score{color:#aaa}
.gbox.selbox .gbox-score{color:#2980b9}

/* ── BOTTOM ── */
.bottom{background:#fff;padding:5px 12px 8px;border-top:1px solid #eee;flex-shrink:0}
.fr{display:flex;gap:5px;align-items:stretch;margin-bottom:5px}
.fbox-db{flex:2;background:#fff;border:1.5px solid #2980b9;border-radius:9px;padding:5px 10px;display:flex;align-items:center;justify-content:space-around}
.fdc{display:flex;flex-direction:column;align-items:center;gap:1px}
.fdc-val{font-size:17px;font-weight:700;line-height:1}
.fdc-lbl{font-size:8px;color:#888}
.fdc-dmg .fdc-val{color:#e8a020}.fdc-bonus .fdc-val{color:#e05530}
.fdiv{width:1px;height:22px;background:#ddeaf8}
.fop-mid{display:flex;align-items:center;font-size:15px;color:#ccc;flex-shrink:0}
.fbox-flux{flex:1;background:#fff;border:1.5px solid #c71585;border-radius:9px;padding:5px 3px;text-align:center}
.fval-flux{font-size:16px;font-weight:700;color:#9b59b6;line-height:1}
.fl{font-size:7px;color:#bbb;margin-top:1px}
.bb{display:flex;gap:6px;align-items:flex-start}
.bc{display:flex;flex-direction:column;gap:2px;width:42px;flex-shrink:0;padding-top:1px}
.brow{display:flex;align-items:center;gap:3px}
.bi{width:12px;text-align:center;flex-shrink:0;font-size:9px}
.bg{flex:1;background:#f0f0f0;border-radius:3px;height:4px;overflow:hidden}
.bf{height:100%;border-radius:3px;transition:width .4s}
.bhp{background:#e74c3c}.bmp{background:#2980b9}
.bv{font-size:7px;color:#bbb;text-align:right}
.btc{flex:1;display:flex;flex-direction:column;gap:4px}
.skrow{display:flex;gap:4px}
.sk{flex:1;border-radius:8px;padding:4px 2px;text-align:center;border:1.5px solid #bbb;background:#f9f9f9;position:relative}
.sk .sn{font-size:8px;font-weight:600;color:#555}.sk .sc{font-size:7px;color:#bbb;margin-top:1px}
.sk.fire{border-color:#e67e22;background:#fff8f0}.sk.fire .sn{color:#d35400}
.sk.sh{border-color:#2980b9;background:#f0f7ff}.sk.sh .sn{color:#1a5276}
.sk.rr{border-color:#8e44ad;background:#f9f0ff}.sk.rr .sn{color:#6c3483}
.sk:disabled{opacity:.28;cursor:not-allowed;border-color:#ddd!important;background:#f8f8f8!important}
.sk:disabled .sn{color:#ccc!important}
.sbadge{position:absolute;top:-5px;right:-5px;background:#27ae60;color:#fff;border-radius:8px;font-size:8px;font-weight:700;padding:1px 4px;display:none;z-index:10;border:1px solid #fff}
.sbadge.on{display:block}
.sk.sh.has-shield{opacity:1!important;border-color:#27ae60!important;background:#f0fff4!important}
.sk.sh.has-shield:disabled{cursor:not-allowed}
.mr{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.mb{border:none;border-radius:10px;padding:8px 6px;font-size:13px;font-weight:700;line-height:1.2}
.mb:active:not(:disabled){transform:scale(.94)}
.mb:disabled{opacity:.25;cursor:not-allowed}
.mb .ms{font-size:7px;display:block;margin-top:1px;opacity:.7;font-weight:400}
.b-roll{background:#2c3e50;color:#ecf0f1}.b-push{background:#6e2f1a;color:#f0c3a1}.b-strike{background:#1e8449;color:#a9dfbf}
.ov{display:none;position:absolute;inset:0;background:rgba(0,0,0,.45);align-items:center;justify-content:center;z-index:50}
.ov.on{display:flex}
.oc{background:#fff;border-radius:14px;padding:18px;text-align:center;width:230px;border:1px solid #ddd}
.ot{font-size:15px;font-weight:600;color:#111;margin-bottom:4px}
.os{font-size:11px;color:#888;margin-bottom:14px;line-height:1.6}
.ob{width:100%;border:none;border-radius:10px;padding:10px;font-size:12px;font-weight:600;cursor:pointer}
.ob.ok{background:#27ae60;color:#fff}.ob.danger{background:#e74c3c;color:#fff}
.toast{position:absolute;top:36%;left:50%;transform:translate(-50%,-50%);background:rgba(20,20,20,.86);color:#fff;border-radius:10px;padding:6px 14px;font-size:11px;text-align:center;pointer-events:none;opacity:0;transition:opacity .18s;z-index:99;white-space:nowrap}
.toast.on{opacity:1}
</style>
</head>
<body>
<div class="phone" id="phone">
  <div class="ez">
    <div class="er">
      <div class="av" id="eavatar">⚓</div>
      <div class="ei">
        <div class="en" id="ename">Rusty Cutlass · Act 1</div>
        <div class="hrow" id="ehprow"><div class="hbar"><div class="hfil" id="ehpbar" style="width:100%"></div></div><div class="htxt" id="ehptxt">60/60</div></div>
        <div class="ebot">
          <div class="ibadge"><div class="idot"></div><span id="itxt">Attack 11 dmg</span></div>
          <button class="rbtn" id="btnRestart">↺ restart</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Combo hint bar: right-aligned, below enemy UI -->
  <div class="combo-hint" id="comboHint">
    <span class="combo-empty">Roll dice to see combos</span>
  </div>

  <div class="ban bust" id="bustBanner">💀 Break! Flux & Bonus lost</div>
  <div class="ban steak" id="steakBanner">🔥 Steak! Flux ×2 — Rolling fresh 6...</div>

  <div class="arena">
    <div class="dg" id="diceGrid"></div>
    <div class="groups-area" id="groupsArea"></div>
  </div>

  <div class="bottom">
    <div class="fr">
      <div class="fbox-db">
        <div class="fdc fdc-dmg"><div class="fdc-val" id="fDmg">0</div><div class="fdc-lbl">Damage</div></div>
        <div class="fdiv"></div>
        <div class="fdc fdc-bonus"><div class="fdc-val" id="fBonus">+0</div><div class="fdc-lbl" id="fBonusLbl">Bonus</div></div>
      </div>
      <div class="fop-mid">×</div>
      <div class="fbox-flux"><div class="fval-flux" id="fFlux">×1.0</div><div class="fl" id="fFluxLbl">Flux</div></div>
    </div>
    <div class="bb">
      <div class="bc">
        <div class="brow" id="hpRow"><div class="bi">❤️</div><div class="bg"><div class="bf bhp" id="barHp" style="width:100%"></div></div></div>
        <div class="bv" id="valHp" style="color:#e74c3c">100/100</div>
        <div style="height:2px"></div>
        <div class="brow"><div class="bi">💧</div><div class="bg"><div class="bf bmp" id="barMana" style="width:0%"></div></div></div>
        <div class="bv" id="valMana" style="color:#2980b9">0/10</div>
        <!-- No ? button — removed -->
      </div>
      <div class="btc">
        <div class="skrow">
          <button class="sk fire" id="btnFireball" disabled><div class="sn">Fireball</div><div class="sc">5dmg·2MP</div></button>
          <button class="sk sh" id="btnShield" disabled><div class="sn">Shield</div><div class="sc">+10blk·2MP</div><div class="sbadge" id="shieldBadge">0</div></button>
          <button class="sk rr" id="btnReroll" disabled><div class="sn">Reroll</div><div class="sc" id="rrSub">sel·2MP</div></button>
        </div>
        <div class="mr">
          <button class="mb b-roll" id="btnLeft" disabled><span id="bll">Roll</span><span class="ms" id="bls">start turn</span></button>
          <button class="mb b-strike" id="btnStrike" disabled>Strike<span class="ms" id="sts">select combo</span></button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="ov" id="overlay"><div class="oc" id="ocard"></div></div>
</div>

<script>
const BASE = 'https://raw.githubusercontent.com/dic1405/dice-prototype/main/';
const ICON_URLS = [
  BASE + 'Icon_Dice_Basic_NormalAttack.png',  // 0 — Normal Attack (new)
  BASE + 'Icon_Dice_Basic_HeavyAttack.png',   // 1 — Strong Attack
  BASE + 'Icon_Dice_Basic_Wine.png',          // 2 — Mana
  BASE + 'Icon_Dice_Basic_Shield.png',        // 3 — Shield
  BASE + 'Icon_Dice_Basic_CannonBall.png',    // 4 — Flux
  BASE + 'Icon_Dice_Basic_Hat.png',           // 5 — Bonus Damage
];
const ICON_ROLLING = BASE + 'Icon_rolling.png'; // rolling animation icon

// Icon names for combo display
const ICON_NAMES = ['Normal Atk','Heavy Atk','Mana','Shield','Flux','Bonus Dmg'];

function mkImg(url, size='70%') {
  const img = document.createElement('img');
  img.src = url; img.style.cssText = `width:${size};height:${size};object-fit:contain;pointer-events:none;display:block`;
  img.draggable = false; return img;
}
function mkIconImg(idx, size='70%') { return mkImg(ICON_URLS[idx], size); }

const DS={F:'free',S:'sel',ST:'stacked'};
const ANIM=2400;
const G={pHp:100,pMaxHp:100,mana:0,maxMana:10,eHp:60,eMaxHp:60,eDmg:11,enemyIdx:0,
  flux:1.0,bonusDmg:0,shield:0,busy:false,phase:'idle',steakActive:false,
  dice:[],ds:[],steakBoxes:[],currentGroups:[]};
const $=id=>document.getElementById(id);
const rnd=()=>Math.floor(Math.random()*6);

function scoreGroup(arr){
  if(!arr.length)return{ad:0,fluxG:0,manaG:0,shieldG:0,bdmgG:0};
  const c={};arr.forEach(d=>c[d]=(c[d]||0)+1);
  let ad=0,fluxG=0,manaG=0,shieldG=0,bdmgG=0;
  if(c[0]){const n=c[0];ad+=n===1?2:n===2?5:n===3?16:n===4?35:n===5?75:140;}
  if(c[1]){const n=c[1];ad+=n===1?6:n===2?15:n===3?42:n===4?105:n===5?225:420;}
  [2,3,4,5].forEach(ic=>{const n=c[ic]||0;if(n<2)return;
    if(ic===2){ad+=n===2?8:n===3?12:n===4?50:n===5?105:195;manaG+=n===2?1:n===3?3:n===4?5:n===5?8:10;}
    else if(ic===3){shieldG+=n===2?4:n===3?12:n===4?28:n===5?60:120;}
    else if(ic===4){ad+=n===2?8:n===3?22:n===4?50:n===5?105:195;if(n>=3)fluxG+=n===3?1:n===4?2.5:n===5?5:6;}
    else if(ic===5){ad+=n===2?0:n===3?10:n===4?22:n===5?45:85;bdmgG+=n===2?4:n===3?20:n===4?50:n===5?100:200;}});
  const allDiff=!Object.values(c).some(v=>v>1);
  if(allDiff){if(arr.length===4)ad+=30;else if(arr.length===5)ad+=60;else if(arr.length===6)ad+=110;}
  return{ad,fluxG,manaG,shieldG,bdmgG};
}
function scoreLabel(groups){
  let ad=0;const e=[];
  for(const g of groups){const s=scoreGroup(g.dice);ad+=s.ad;if(s.fluxG>0)e.push('+'+s.fluxG.toFixed(1)+'fx');if(s.manaG>0)e.push('+'+s.manaG+'MP');if(s.shieldG>0)e.push('+'+s.shieldG+'blk');if(s.bdmgG>0)e.push('+'+s.bdmgG+'BD↑');}
  let l=ad>0?ad+' AD':'';if(e.length)l+=(l?' ':'')+e.join(' ');return l||'—';
}
function analyze(){
  const si=G.ds.map((s,i)=>s===DS.S?i:-1).filter(i=>i>=0);
  if(!si.length)return{vi:[],ii:[],hasCombo:false,hasInvalid:false};
  const icons=si.map(i=>G.dice[i]);const c={};icons.forEach(d=>c[d]=(c[d]||0)+1);
  const allDiff=!Object.values(c).some(v=>v>1);
  if(allDiff&&si.length>=4)return{vi:si,ii:[],hasCombo:true,hasInvalid:false};
  const vs=new Set();if(c[0])vs.add(0);if(c[1])vs.add(1);
  [2,3,4,5].forEach(ic=>{if((c[ic]||0)>=2)vs.add(ic);});
  const vi=si.filter(i=>vs.has(G.dice[i])),ii=si.filter(i=>!vs.has(G.dice[i]));
  return{vi,ii,hasCombo:vi.length>0,hasInvalid:ii.length>0};
}
const canPush=()=>{const{hasCombo,hasInvalid}=analyze();return hasCombo&&!hasInvalid;};
function hasCombo(arr){
  if(!arr.length)return false;if(arr.some(d=>d===0||d===1))return true;
  const c={};arr.forEach(d=>c[d]=(c[d]||0)+1);
  if([2,3,4,5].some(ic=>(c[ic]||0)>=2))return true;
  return!Object.values(c).some(v=>v>1)&&arr.length>=4;
}
function calcCombo(){
  const{vi,hasInvalid}=analyze();if(hasInvalid)return null;
  const board=vi.map(i=>G.dice[i]);
  let tAD=0,tFx=0,tMana=0,tShield=0,tBD=0;
  for(const sb of G.steakBoxes)for(const g of sb.groups){const s=scoreGroup(g.dice);tAD+=s.ad;tFx+=s.fluxG;tMana+=s.manaG;tShield+=s.shieldG;tBD+=s.bdmgG;}
  for(const g of G.currentGroups){const s=scoreGroup(g.dice);tAD+=s.ad;tFx+=s.fluxG;tMana+=s.manaG;tShield+=s.shieldG;tBD+=s.bdmgG;}
  if(board.length){const s=scoreGroup(board);tAD+=s.ad;tFx+=s.fluxG;tMana+=s.manaG;tShield+=s.shieldG;tBD+=s.bdmgG;}
  if(!tAD&&!tShield&&!tBD&&!tMana&&!tFx)return null;
  const effectiveFlux=G.flux+tFx,totalDmg=Math.round((tAD+G.bonusDmg+tBD)*effectiveFlux);
  return{ad:tAD,fluxG:tFx,manaG:tMana,shieldG:tShield,bdmgG:tBD,effectiveFlux,totalDmg,board};
}

// ── COMBO HINT: analyse current dice & show possible combos ──
function buildComboHint(diceArr) {
  const hint = $('comboHint');
  hint.innerHTML = '';
  if (!diceArr || !diceArr.length) {
    hint.innerHTML = '<span class="combo-empty">Roll dice to see combos</span>';
    return;
  }
  const c = {}; diceArr.forEach(d => c[d] = (c[d]||0)+1);
  const chips = [];

  // Single die combos (0,1 always count solo)
  if (c[0]) {
    const n = c[0], vals = [2,5,16,35,75,140];
    chips.push({icon:0, label: n+'× Normal → '+(n===1?2:n===2?5:n===3?16:n===4?35:n===5?75:140)+' AD', special:false});
  }
  if (c[1]) {
    const n = c[1], vals = [6,15,42,105,225,420];
    chips.push({icon:1, label: n+'× Heavy → '+(n===1?6:n===2?15:n===3?42:n===4?105:n===5?225:420)+' AD', special:false});
  }

  // Pair+ combos
  [2,3,4,5].forEach(ic => {
    const n = c[ic]||0; if(n<2) return;
    let lbl = '';
    if(ic===2){
      const ad=n===2?8:n===3?12:n===4?50:n===5?105:195;
      const mp=n===2?1:n===3?3:n===4?5:n===5?8:10;
      lbl = n+'× Mana → '+ad+'AD +'+mp+'MP';
    } else if(ic===3){
      const blk=n===2?4:n===3?12:n===4?28:n===5?60:120;
      lbl = n+'× Shield → +'+blk+' blk';
    } else if(ic===4){
      const ad=n===2?8:n===3?22:n===4?50:n===5?105:195;
      const fx=n>=3?(n===3?1:n===4?2.5:5):0;
      lbl = n+'× Flux → '+ad+'AD'+(fx>0?' +'+fx+'fx':'');
    } else if(ic===5){
      const ad=n>=3?(n===3?10:n===4?22:45):0;
      const bd=n===2?4:n===3?20:n===4?50:100;
      lbl = n+'× BonusDmg → '+(ad?ad+'AD ':'')+'BD+'+bd;
    }
    chips.push({icon:ic, label:lbl, special:false});
  });

  // 4-different special
  const allDiff = !Object.values(c).some(v=>v>1);
  if(allDiff && diceArr.length>=4){
    const ad = diceArr.length===4?30:diceArr.length===5?60:110;
    chips.push({icon:null, label: diceArr.length+'-Different → '+ad+' AD', special:true});
  }

  // Steak check
  if(diceArr.length===6){
    chips.push({icon:null, label:'🔥 Push all → Steak!', special:true, steak:true});
  }

  if(!chips.length){
    hint.innerHTML = '<span class="combo-empty">No combos yet</span>';
    return;
  }

  chips.forEach(ch => {
    const chip = document.createElement('div');
    chip.className = 'combo-chip' + (ch.steak?' steak':ch.special?' special':'');
    if(ch.icon !== null) {
      chip.appendChild(mkIconImg(ch.icon, '10px'));
    }
    const txt = document.createElement('span');
    txt.textContent = ch.label;
    chip.appendChild(txt);
    hint.appendChild(chip);
  });
}

function makeDie(iconIdx,cls,lbl,onClick,inv=false){
  const w=document.createElement('div');w.className='dw';
  const d=document.createElement('div');d.className='die '+cls;
  // Always white background — no tint
  d.style.background='#fff';
  d.style.borderColor=inv?'#e74c3c':cls==='sel'?'#f39c12':'#ddd';
  d.appendChild(mkIconImg(iconIdx));
  if(onClick)d.onclick=onClick;
  const l=document.createElement('div');l.className='dlbl'+(lbl==='keep?'?' s':lbl==='no pair'?' inv':'');l.textContent=lbl;
  w.appendChild(d);w.appendChild(l);return w;
}
function makeSlot(){
  const w=document.createElement('div');w.className='dw';
  const d=document.createElement('div');d.className='die slot';
  const img=mkIconImg(3,'20%');img.style.opacity='.1';d.appendChild(img);
  const l=document.createElement('div');l.className='dlbl';l.textContent='—';
  w.appendChild(d);w.appendChild(l);return w;
}
function makeAnim(steak=false){
  const w=document.createElement('div');w.className='dw';
  const d=document.createElement('div');d.className='die '+(steak?'hotdie':'free')+' rolling';
  d.style.background='#fff';
  // Use Icon_rolling.png for rolling animation
  d.appendChild(mkImg(ICON_ROLLING,'70%'));
  const l=document.createElement('div');l.className='dlbl';l.style.color=steak?'#e67e22':'';l.textContent=steak?'steak!':'rolling';
  w.appendChild(d);w.appendChild(l);return w;
}
function makeChip(idx){const ch=document.createElement('div');ch.className='gchip';ch.appendChild(mkIconImg(idx,'10px'));return ch;}

function renderDice(){
  const grid=$('diceGrid');grid.innerHTML='';
  const{ii}=analyze();const inv=new Set(ii);let vis=0;
  G.dice.forEach((d,i)=>{
    if(G.ds[i]===DS.ST)return;vis++;
    const isInv=G.ds[i]===DS.S&&inv.has(i);
    grid.appendChild(makeDie(d,G.ds[i]===DS.S?'sel':'free',G.ds[i]===DS.S?(isInv?'no pair':'keep?'):'free',()=>tapDie(i),isInv));
  });
  for(let i=vis;i<6;i++)grid.appendChild(makeSlot());
  // Update combo hint with remaining free dice
  const freeDice=G.dice.filter((_,i)=>G.ds[i]!==DS.ST);
  buildComboHint(G.phase==='rolled'?freeDice:null);
  renderGroups();updateFormula();renderBtns();
}
function showAnimGrid(count,steak=false){
  const grid=$('diceGrid');grid.innerHTML='';
  for(let i=0;i<count;i++)grid.appendChild(makeAnim(steak));
  for(let i=count;i<6;i++)grid.appendChild(makeSlot());
  buildComboHint(null);
}
function showRerolling(selIdxs){
  const grid=$('diceGrid');grid.innerHTML='';const sel=new Set(selIdxs);let vis=0;
  G.dice.forEach((d,i)=>{if(G.ds[i]===DS.ST)return;vis++;grid.appendChild(sel.has(i)?makeAnim(false):makeDie(d,G.ds[i]===DS.S?'sel':'free',G.ds[i]===DS.S?'keep?':'free',null));});
  for(let i=vis;i<6;i++)grid.appendChild(makeSlot());
}
function renderGroups(newSteakIdx=-1){
  const area=$('groupsArea');area.innerHTML='';
  function makeBox(cls,label,groups,animate=false){
    const box=document.createElement('div');box.className='gbox '+cls+(animate?' new':'');
    const lbl=document.createElement('div');lbl.className='gbox-lbl';lbl.textContent=label;
    const content=document.createElement('div');content.className='gbox-content';
    groups.forEach((g,gi)=>{if(gi>0){const cm=document.createElement('div');cm.className='gcomma';cm.textContent=',';content.appendChild(cm);}g.dice.forEach(ic=>content.appendChild(makeChip(ic)));});
    const sc=document.createElement('div');sc.className='gbox-score';sc.textContent=scoreLabel(groups);
    box.appendChild(lbl);box.appendChild(content);box.appendChild(sc);return box;
  }
  G.steakBoxes.forEach((sb,i)=>area.appendChild(makeBox('steak','🔥 Steak!',sb.groups,i===newSteakIdx)));
  if(G.currentGroups.length>0)area.appendChild(makeBox('pushrow','Push Luck',G.currentGroups));
  if(G.phase==='rolled'&&G.dice.length>0){
    const{vi,hasInvalid}=analyze();
    if(vi.length>0&&!hasInvalid){
      const selDice=vi.map(i=>G.dice[i]);
      const box=document.createElement('div');box.className='gbox selbox';
      const lbl=document.createElement('div');lbl.className='gbox-lbl';lbl.textContent='Selection';
      const content=document.createElement('div');content.className='gbox-content';
      selDice.forEach(ic=>content.appendChild(makeChip(ic)));
      const sc=document.createElement('div');sc.className='gbox-score';sc.textContent=scoreLabel([{dice:selDice}]);
      box.appendChild(lbl);box.appendChild(content);box.appendChild(sc);area.appendChild(box);
    }
  }
}
function updateFormula(){
  const combo=calcCombo();
  if(combo){$('fDmg').textContent=combo.ad;$('fBonus').textContent='+'+(G.bonusDmg+combo.bdmgG);$('fBonusLbl').textContent=combo.bdmgG>0?'Bonus(+'+combo.bdmgG+')':'Bonus';$('fFlux').textContent='×'+combo.effectiveFlux.toFixed(1);$('fFluxLbl').textContent=combo.fluxG>0?'Flux(+'+combo.fluxG.toFixed(1)+')':'Flux';$('sts').textContent='deal '+combo.totalDmg;}
  else{$('fDmg').textContent='0';$('fBonus').textContent='+'+G.bonusDmg;$('fBonusLbl').textContent='Bonus';$('fFlux').textContent='×'+G.flux.toFixed(1);$('fFluxLbl').textContent='Flux';$('sts').textContent='select combo';}
}
function renderBtns(){
  const ph=G.phase,anim=G.busy,combo=calcCombo(),_can=!anim&&ph==='rolled'&&canPush(),mp=G.mana>=2;
  const{hasInvalid,hasCombo:hc}=analyze(),hasSel=G.ds.some(s=>s===DS.S);
  const bl=$('btnLeft'),bll=$('bll'),bls=$('bls');
  if(anim){bl.className='mb b-roll';bl.disabled=true;bll.textContent='Roll';bls.textContent='rolling...';}
  else if(ph==='idle'){bl.className='mb b-roll';bl.disabled=false;bll.textContent='Roll';bls.textContent='start turn';}
  else{bl.className='mb b-push';bl.disabled=!_can;bll.textContent='Push Luck';bls.textContent=hasInvalid?'remove invalid':!hc?'select combo':'lock & roll rest';}
  $('btnStrike').disabled=!combo||anim||ph!=='rolled';$('btnFireball').disabled=!mp||anim;
  const shBtn=$('btnShield'),badge=$('shieldBadge');
  if(G.shield>0){shBtn.classList.add('has-shield');badge.textContent=G.shield;badge.classList.add('on');}
  else{shBtn.classList.remove('has-shield');badge.classList.remove('on');}
  shBtn.disabled=!mp||anim;$('btnReroll').disabled=!mp||anim||ph!=='rolled'||!hasSel;
  $('rrSub').textContent=mp?(hasSel?'sel·2MP':'select'):'no MP';
}
function updateUI(){
  $('barHp').style.width=Math.round(G.pHp/G.pMaxHp*100)+'%';$('valHp').textContent=G.pHp+'/'+G.pMaxHp;
  $('barMana').style.width=Math.round(G.mana/G.maxMana*100)+'%';$('valMana').textContent=G.mana+'/'+G.maxMana;
  $('ehpbar').style.width=Math.round(Math.max(0,G.eHp)/G.eMaxHp*100)+'%';$('ehptxt').textContent=Math.max(0,G.eHp)+'/'+G.eMaxHp;
}
function toast(msg,ms=1400){const t=$('toast');t.textContent=msg;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),ms);}
function hideBanners(){$('bustBanner').classList.remove('on');$('steakBanner').classList.remove('on');}
function showOverlay(html){$('ocard').innerHTML=html;$('overlay').classList.add('on')}
window.hideOverlay=()=>$('overlay').classList.remove('on');
function flashEnemy(dmg){const av=$('eavatar');av.classList.remove('flash','bigshake');void av.offsetWidth;if(dmg>50){av.classList.add('bigshake');setTimeout(()=>av.classList.remove('bigshake'),650);}else{av.classList.add('flash');setTimeout(()=>av.classList.remove('flash'),400);}}
function shakeHp(){const r=$('hpRow');r.classList.remove('shake');void r.offsetWidth;r.classList.add('shake');setTimeout(()=>r.classList.remove('shake'),400);}
function applyEnemyHit(){
  const blocked=Math.min(G.shield,G.eDmg),dmgToHp=G.eDmg-blocked;
  G.shield=Math.max(0,G.shield-G.eDmg);G.pHp=Math.max(0,G.pHp-dmgToHp);shakeHp();
  if(blocked>0&&dmgToHp===0)toast('Shield blocked! '+G.shield+' left',1900);
  else if(blocked>0)toast('Blocked '+blocked+' → −'+dmgToHp+' HP',1900);
  else toast('Enemy hits! −'+dmgToHp+' HP',1900);
  updateUI();renderBtns();
}
function tapDie(i){if(G.busy||G.phase!=='rolled')return;hideBanners();G.ds[i]=G.ds[i]===DS.S?DS.F:DS.S;renderDice();}
function doBreak(){
  if(G.steakActive){G.flux=1.0;G.bonusDmg=0;G.steakActive=false;}
  G.steakBoxes=[];G.currentGroups=[];renderGroups();$('bustBanner').classList.add('on');renderBtns();renderDice();updateUI();
  buildComboHint(null);
  setTimeout(()=>{$('bustBanner').classList.remove('on');applyEnemyHit();
    if(G.pHp<=0){G.busy=false;G.phase='idle';setTimeout(()=>showOverlay('<div class="ot">Run over 💀</div><div class="os">You were defeated!</div><button class="ob danger" onclick="window.restart()">Try again</button>'),400);return;}
    setTimeout(()=>{G.flux=1.0;G.busy=false;G.phase='idle';G.dice=[];G.ds=[];G.steakBoxes=[];G.currentGroups=[];hideBanners();renderGroups();renderDice();updateFormula();updateUI();buildComboHint(null);},900);
  },1800);
}
function doRoll(){
  G.busy=true;G.phase='rolling';G.steakActive=false;showAnimGrid(6);renderBtns();
  G.steakBoxes=[];G.currentGroups=[];G.dice=Array.from({length:6},rnd);G.ds=Array(6).fill(DS.F);
  setTimeout(()=>{G.phase='rolled';G.busy=false;hideBanners();if(!hasCombo(G.dice))doBreak();else{renderDice();updateUI();}},ANIM);
}
function doPushLuck(){
  if(G.busy||G.phase!=='rolled')return;if(!canPush()){toast('Fix invalid dice first');return;}
  const{vi}=analyze();G.currentGroups.push({dice:vi.map(i=>G.dice[i])});
  vi.forEach(i=>G.ds[i]=DS.ST);G.ds.forEach((s,i)=>{if(s===DS.S)G.ds[i]=DS.F;});
  const pushed=G.ds.filter(s=>s===DS.ST).length;
  if(pushed===6){
    const newSteakIdx=G.steakBoxes.length;G.steakBoxes.push({groups:[...G.currentGroups]});G.currentGroups=[];
    const oldFlux=G.flux;G.flux*=2;G.steakActive=true;G.busy=true;G.phase='pushing';
    $('steakBanner').classList.add('on');showAnimGrid(6,true);renderGroups(newSteakIdx);renderBtns();
    setTimeout(()=>{G.dice=Array.from({length:6},rnd);G.ds=Array(6).fill(DS.F);G.phase='rolled';G.busy=false;$('steakBanner').classList.remove('on');
      if(!hasCombo(G.dice))doBreak();else{renderDice();updateUI();toast('🔥 Steak! Flux ×'+oldFlux.toFixed(1)+' → ×'+G.flux.toFixed(1)+'!',2400);}},ANIM);return;
  }
  const fi=G.ds.map((s,i)=>s===DS.F?i:-1).filter(i=>i>=0);
  if(!fi.length){hideBanners();renderDice();updateUI();return;}
  G.busy=true;G.phase='pushing';
  const grid=$('diceGrid');grid.innerHTML='';G.ds.forEach(s=>{if(s===DS.ST)return;grid.appendChild(makeAnim(false));});
  renderGroups();renderBtns();buildComboHint(null);
  setTimeout(()=>{fi.forEach(i=>{G.dice[i]=rnd();G.ds[i]=DS.F;});G.phase='rolled';G.busy=false;hideBanners();if(!hasCombo(fi.map(i=>G.dice[i])))doBreak();else{renderDice();updateUI();}},ANIM);
}
function doStrike(){
  if(G.busy||G.phase!=='rolled')return;const combo=calcCombo();if(!combo)return;
  G.busy=true;G.phase='striking';hideBanners();renderBtns();
  G.mana=Math.min(G.maxMana,G.mana+combo.manaG);G.bonusDmg+=combo.bdmgG;G.shield+=combo.shieldG;
  const td=combo.totalDmg;G.eHp=Math.max(0,G.eHp-td);G.steakActive=false;
  flashEnemy(td);
  const extras=[];if(combo.bdmgG>0)extras.push('+'+combo.bdmgG+'BD');if(combo.shieldG>0)extras.push('🛡️+'+combo.shieldG);
  toast(td+' dmg!'+(extras.length?' ('+extras.join(' ')+'!)':''));updateUI();
  setTimeout(()=>{
    if(G.eHp<=0){G.busy=false;G.phase='idle';showOverlay('<div class="ot">Victory! 🏆</div><div class="os">'+$('ename').textContent+' defeated!</div><button class="ob ok" onclick="window.nextEnemy()">Next →</button>');return;}
    setTimeout(()=>{applyEnemyHit();
      if(G.pHp<=0){G.busy=false;G.phase='idle';setTimeout(()=>showOverlay('<div class="ot">Run over</div><div class="os">You were defeated!</div><button class="ob danger" onclick="window.restart()">Try again</button>'),400);return;}
      setTimeout(()=>{G.steakBoxes=[];G.currentGroups=[];G.flux=1.0;G.busy=false;G.phase='idle';G.dice=[];G.ds=[];G.steakActive=false;hideBanners();renderGroups();renderDice();updateFormula();updateUI();buildComboHint(null);},700);
    },500);
  },500);
}
$('btnLeft').onclick=()=>{if(G.phase==='idle')doRoll();else if(G.phase==='rolled')doPushLuck();};
$('btnStrike').onclick=doStrike;
$('btnFireball').onclick=()=>{if(G.mana<2)return;G.mana-=2;G.eHp=Math.max(0,G.eHp-5);flashEnemy(5);toast('Fireball! −5 HP');updateUI();renderBtns();};
$('btnShield').onclick=()=>{if(G.mana<2)return;G.mana-=2;G.shield+=10;toast('Shield +10! Total: '+G.shield);updateUI();renderBtns();};
$('btnReroll').onclick=()=>{
  if(G.mana<2||G.phase!=='rolled'||G.busy)return;
  const sel=G.ds.map((s,i)=>s===DS.S?i:-1).filter(i=>i>=0);
  if(!sel.length){toast('Select dice to reroll first');return;}
  G.mana-=2;G.busy=true;G.phase='pushing';showRerolling(sel);renderBtns();buildComboHint(null);
  setTimeout(()=>{sel.forEach(i=>{G.dice[i]=rnd();G.ds[i]=DS.F;});G.busy=false;G.phase='rolled';hideBanners();renderDice();updateUI();toast('Rerolled '+sel.length+' dice!');},ANIM);
};
$('btnRestart').onclick=doRestart;
const ENEMIES=[
  {name:'Rusty Cutlass · Act 1',icon:'⚓',hp:60,dmg:11},
  {name:'The Bilge Rat · Act 1',icon:'🐀',hp:75,dmg:13},
  {name:'Saltwind Marauder · Act 1',icon:'🏴‍☠️',hp:95,dmg:14},
  {name:'Crimson Brigantine · Act 1',icon:'⚡',hp:115,dmg:16},
  {name:'Black Corsair · Act 1',icon:'💀',hp:130,dmg:18},
];
function setEnemy(idx){const e=ENEMIES[Math.min(idx,ENEMIES.length-1)];G.enemyIdx=idx;G.eHp=e.hp;G.eMaxHp=e.hp;G.eDmg=e.dmg;$('eavatar').textContent=e.icon;$('ename').textContent=e.name;$('itxt').textContent='Attack '+e.dmg+' dmg';updateUI();}
function doRestart(){window.hideOverlay();Object.assign(G,{pHp:100,mana:0,flux:1.0,bonusDmg:0,shield:0,busy:false,steakActive:false,phase:'idle',dice:[],ds:[],steakBoxes:[],currentGroups:[],enemyIdx:0});setEnemy(0);hideBanners();renderGroups();renderDice();updateFormula();updateUI();buildComboHint(null);}
window.restart=doRestart;
window.nextEnemy=()=>{hideOverlay();Object.assign(G,{bonusDmg:0,shield:0,flux:1.0,busy:false,steakActive:false,phase:'idle',dice:[],ds:[],steakBoxes:[],currentGroups:[]});setEnemy(G.enemyIdx+1);hideBanners();renderGroups();renderDice();updateFormula();updateUI();buildComboHint(null);};
doRestart();
</script>
